name: manga-ocr

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        transformers-version: [ "4.51.3", "transformers" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"
          uv pip install "${{ matrix.transformers-version == 'transformers' && 'transformers' || format('transformers=={0}', matrix.transformers-version) }}"

      - name: Test
        run: uv run pytest
